<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body{
        margin:0;
        font-family: Arial, Helvetica, sans-serif;
      }
      .navbar{
        display:flex;
        justify-content: space-between;
        align-items: center;
       background-color: black;
        padding:10px 20px;
        color:white;
      }
    .brand{
        font-size: 20px;
        font-weight: bold;
        
        padding:5px;
    }
    .nav-links{
        display:flex;
        gap:20px;
        
        padding:5px;
    }
    .nav-links a{
        text-decoration: none;
        color:white;
       
       padding:5px;
    }
    .dark{
        background-color: black;
        color:white;
    }
    .dark a{
        color:white;

    }
    .blue{
        background-color: blue;
        color:white;
    }
    .blue a{
        color:white;
    }
    .white{
        background-color: white;
        color:black;
    }
    .white a{
        color:black;
    }
    .right-section{
        display:flex;
        gap:10px;
        
        padding:10px;
    }
    .right-section input{
        padding:6px;
        border:none;
        border-radius:4px;
        width:250px;
        height:30px;
     
    }
    .right-section button{
        padding:6px 12px;
        color:white;
     background-color: black;
        border: 1px solid white;
        border-radius:4px;
     cursor:pointer;
    }
    .left-section{
        display:flex;
        gap:20px;
        align-items: center;
    }
    .dark button{
        background-color: black;
        color:white;
        border: 1px solid white;
    }
    .blue button{
        background-color: blue;
        color:white;
        border: 1px solid white;
    }
    .white button{
        background-color: white;
        color:black;
        border: 1px solid black;
    }
        
    </style>
</head>
<body>
     
    <div class="navbar dark">
        
        <div class="left-section">
        <div class="brand">Brand</div>
        <div class="nav-links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>
        </div>
        
        <div class="right-section">
            <input type="text" placeholder="Search">
             <button>Search</button>
        </div>
    </div>
<br>
    <div class="navbar blue">
        <div class="left-section">
        <div class="brand">Brand</div>
        <div class="nav-links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>
        </div>
       
        <div class="right-section">
            <input type="text" placeholder="Search">
             <button>Search</button>
        </div>
    </div>
<br>
    <div class="navbar white">
        <div class="left-section">
        <div class="brand">Brand</div>
        <div class="nav-links">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
        </div>
        </div>
        <div class="right-section">
            <input type="text" placeholder="Search">
             <button>Search</button>
        </div>
    </div>
</body>
</html>
