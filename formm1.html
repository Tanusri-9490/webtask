<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>LOGIN PAGE</legend>
             <label for="firstname">First Name:</label>
            <input type="text" id="firstname"  maxlength="20" name="firstname">
            <br></br>
            <label for="lastname">Last Name:</label>
            <input type="text" id="lastname"  maxlength="20" name="lastname">
            <br><br/>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob">
            <br></br>
            <label for="password">Password</label>
            <input type="password" id="password" name="password">
            <br><br/>
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
            <br><br/>
            <label for="phoneno">Mobile No</label>
            <input type="tel" id="phoneno" name="phoneno" maxlength="10">
            <br><br/>
             <label for="address"> Address</label>
             <br>
             <textarea id="address" name="address"></textarea>
             <br><br/>
             <label for="city">City Name</label>
             <input type="text" id="city" name="city">
             <br><br/>
             <label for="pincode">Pincode</label>
             <input type="tel" id="pincode" name="pincode" maxlength="6">
             <br><br/>
            <label for="gender">Gender</label>
           <br> 
            MALE<input type="radio" name="gender"> 
            FEMALE<input type="radio" name="gender"> 
            <br><br/>
            <label for="checkbox">Skills</label>
            <br>
            <input type="checkbox" id="checkbox" name="skills" value="java">Java  
            <input type="checkbox" id="checkbox" name="skills" value="python">Python 
            <input type="checkbox" id="checkbox" name="skills" value="webtech">Web tech 
            <br><br/>
            <label for="nation">Nation</label>
            <br>
            <select name="nation" id="nation">
                <option value="india">India</option>
                <option value="usa">USA</option>
            </select>
           

            
        </fieldset>
    </form>
</body>
</html>
